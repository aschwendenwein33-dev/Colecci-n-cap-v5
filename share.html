<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ColecciónCAP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--gold:#F5C400;--black:#0e0e0e;--surface:#161616;--card:#1e1e1e;--border:#2e2e2e;--text:#f0f0f0;--muted:#777;--success:#4ec994;--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 38px,rgba(245,196,0,0.022) 38px,rgba(245,196,0,0.022) 40px);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:520px;display:flex;flex-direction:column;gap:20px}
.brand{display:flex;align-items:center;gap:10px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.brand-dot{width:36px;height:36px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px rgba(245,196,0,0.35);flex-shrink:0}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold)}
.brand-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.photo-box{aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--border);cursor:pointer;transition:transform 0.2s}
.photo-box:hover{transform:scale(1.03)}
.photo-box.main{grid-column:1/-1;aspect-ratio:16/9}
.photo-box img{width:100%;height:100%;object-fit:cover}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.jersey-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.jersey-name{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1.1;color:var(--text);margin-bottom:14px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px}
.field .lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.field .val{font-size:14px;font-weight:700;color:var(--text)}
.field.gold .val{color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:20px}
.field.full{grid-column:1/-1}
.comment{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px;font-size:13px;line-height:1.6;color:var(--muted)}
.footer{text-align:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;padding-top:8px}
.loading{text-align:center;padding:60px 0;font-family:'DM Mono',monospace;color:var(--muted);font-size:13px}
.loading-dot{display:inline-block;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
.not-found{text-align:center;padding:60px 20px}
.not-found-icon{font-size:52px;display:block;margin-bottom:12px;opacity:0.4}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:12px}.lightbox-next{right:12px}
.lightbox-counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.6)}
.tag{padding:3px 9px;border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500;display:inline-block}
.tag-gold{background:rgba(245,196,0,0.12);color:var(--gold);border:1px solid rgba(245,196,0,0.2)}
.tag-green{background:rgba(78,201,148,0.12);color:var(--success);border:1px solid rgba(78,201,148,0.2)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}

/* EXPIRED */
.expired-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;text-align:center;padding:32px}
.expired-icon{font-size:64px;opacity:0.6}
.expired-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--danger,#e05252);letter-spacing:1px}
.expired-sub{font-size:13px;color:var(--muted,#777);font-family:'DM Mono',monospace;line-height:1.7}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading"><span class="loading-dot">⏳</span> Cargando camiseta...</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="lbNav(-1)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox-next" onclick="lbNav(1)">›</button>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyB5SVHc7ZuW3SfydN5Z3Tkf6QYGmxgugYo",
  authDomain: "coleccioncap.firebaseapp.com",
  projectId: "coleccioncap",
  storageBucket: "coleccioncap.firebasestorage.app",
  messagingSenderId: "889091701271",
  appId: "1:889091701271:web:53a8fa07c9d524c2a9fa52"
};
firebase.initializeApp(firebaseConfig);
var fs = firebase.firestore();

var lbPhotos = [], lbIdx = 0;
function openLightbox(photos, idx) {
  lbPhotos = photos; lbIdx = idx || 0; updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lbKey);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lbKey);
}
function lbNav(d) { lbIdx = (lbIdx + d + lbPhotos.length) % lbPhotos.length; updateLb(); }
function updateLb() {
  document.getElementById('lbImg').src = lbPhotos[lbIdx];
  document.getElementById('lbCounter').textContent = (lbIdx+1) + ' / ' + lbPhotos.length;
}
function lbKey(e) {
  if (e.key==='ArrowRight') lbNav(1);
  if (e.key==='ArrowLeft') lbNav(-1);
  if (e.key==='Escape') closeLightbox();
}
document.getElementById('lightbox').addEventListener('touchstart', function(e){ window._lbTx = e.touches[0].clientX; });
document.getElementById('lightbox').addEventListener('touchend', function(e){
  var d = (window._lbTx||0) - e.changedTouches[0].clientX;
  if (Math.abs(d)>50) lbNav(d>0?1:-1);
});

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var params = new URLSearchParams(window.location.search);
var uid = params.get('id');
var exp = params.get('exp');

// Check expiry
if (exp && Date.now() > parseInt(exp)) {
  document.getElementById('wrap').innerHTML = '<div class="expired-screen">'
    + '<div class="expired-icon">⏱️</div>'
    + '<div class="expired-title">Link Expirado</div>'
    + '<div class="expired-sub">Este link venció.<br>Pedile al dueño de la colección<br>que comparta uno nuevo.</div>'
    + '</div>';
} else if (!uid) {
  document.getElementById('wrap').innerHTML = '<div class="not-found"><span class="not-found-icon">👕</span><div style="font-family:\'DM Mono\',monospace;color:var(--muted);font-size:13px">No se especificó ninguna camiseta.</div></div>';
} else {
  fs.collection('camisetas').doc(uid).get().then(function(doc) {
    if (!doc.exists) {
      document.getElementById('wrap').innerHTML = '<div class="not-found"><span class="not-found-icon">❓</span><div style="font-family:\'DM Mono\',monospace;color:var(--muted);font-size:13px">Camiseta no encontrada.</div></div>';
      return;
    }
    var j = doc.data();
    var photos = (j.photos || []).filter(Boolean);
    var allPhotos = photos;

    // Build photos HTML
    var photosHtml = '';
    if (photos.length === 0) {
      photosHtml = '<div class="photo-box main">👕</div>';
    } else if (photos.length === 1) {
      photosHtml = '<div class="photo-box main" onclick="openLightbox(allPhotos,0)"><img src="' + photos[0] + '" alt=""></div>';
    } else {
      photosHtml = photos.map(function(p, i) {
        var cls = i === 0 ? 'photo-box main' : 'photo-box';
        return '<div class="' + cls + '" onclick="openLightbox(allPhotos,' + i + ')"><img src="' + p + '" alt=""></div>';
      }).join('');
    }

    var edEsp = j.edicionEspecial === 'si' ? ('Sí' + (j.edicionDesc ? ' · ' + j.edicionDesc : '')) : null;
    var jugStr = [j.numero ? '#' + j.numero : '', j.jugador].filter(Boolean).join(' · ');

    var tagsHtml = '';
    if (j.version) tagsHtml += '<span class="tag tag-gold">' + escHtml(j.version) + '</span>';
    if (j.edicionEspecial === 'si') tagsHtml += '<span class="tag tag-green">Ed. Especial</span>';

    var fieldsHtml = '';
    if (j.anio) fieldsHtml += '<div class="field"><div class="lbl">Año</div><div class="val">' + escHtml(j.anio) + '</div></div>';
    if (j.modelo) fieldsHtml += '<div class="field"><div class="lbl">Modelo</div><div class="val">' + escHtml(j.modelo) + '</div></div>';
    if (j.talle) fieldsHtml += '<div class="field"><div class="lbl">Talle</div><div class="val">' + escHtml(j.talle) + '</div></div>';
    if (j.mangas) fieldsHtml += '<div class="field"><div class="lbl">Mangas</div><div class="val">' + escHtml(j.mangas) + '</div></div>';
    if (j.torneo) fieldsHtml += '<div class="field"><div class="lbl">Torneo</div><div class="val">' + escHtml(j.torneo) + '</div></div>';
    if (j.estado) fieldsHtml += '<div class="field"><div class="lbl">Estado</div><div class="val">' + escHtml(j.estado) + '</div></div>';
    if (jugStr) fieldsHtml += '<div class="field full"><div class="lbl">Jugador</div><div class="val">' + escHtml(jugStr) + '</div></div>';
    if (edEsp) fieldsHtml += '<div class="field full"><div class="lbl">Edición especial</div><div class="val">' + escHtml(edEsp) + '</div></div>';
    if (j.valor) fieldsHtml += '<div class="field gold"><div class="lbl">Valor estimado</div><div class="val">USD ' + j.valor.toLocaleString() + '</div></div>';

    var commentHtml = j.comentarios ? '<div class="comment"><strong style="color:var(--muted);font-size:10px;font-family:\'DM Mono\',monospace;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">Comentarios</strong>' + escHtml(j.comentarios) + '</div>' : '';

    document.title = 'CAP · ' + j.id;
    document.getElementById('wrap').innerHTML =
      '<div class="brand"><div class="brand-dot">🏆</div><div><div class="brand-name">ColecciónCAP</div><div class="brand-sub">Colección de Camisetas Peñarol</div></div></div>'
      + '<div class="photos">' + photosHtml + '</div>'
      + '<div class="card">'
      + '<div class="jersey-id">📡 ' + escHtml(j.id) + '</div>'
      + '<div class="jersey-name">' + escHtml(j.torneo || j.version || 'Peñarol') + '</div>'
      + (tagsHtml ? '<div class="tags">' + tagsHtml + '</div>' : '')
      + '<div class="fields">' + fieldsHtml + '</div>'
      + '</div>'
      + commentHtml
      + '<div class="footer">ColecciónCAP · Peñarol · Historia aurinegra</div>';

    // Re-bind allPhotos for lightbox after innerHTML replacement
    window.allPhotos = allPhotos;
    document.querySelectorAll('.photo-box').forEach(function(el, i) {
      el.addEventListener('click', function() { openLightbox(window.allPhotos, i < allPhotos.length ? i : 0); });
    });
  }).catch(function(e) {
    document.getElementById('wrap').innerHTML = '<div class="not-found"><span class="not-found-icon">❌</span><div style="font-family:\'DM Mono\',monospace;color:var(--muted);font-size:13px">Error cargando datos.</div></div>';
  });
}
}
</script>
</body>
</html>
